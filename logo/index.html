<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Football Logo Guesser</title>

<link rel="icon" type="image/png" href="https://wcxpert.github.io/club/images/icon/favicon-96x96.png">
<link rel="icon" type="image/svg+xml" href="https://wcxpert.github.io/club/images/icon/favicon.svg">
<link rel="shortcut icon" href="https://wcxpert.github.io/club/images/icon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="https://wcxpert.github.io/club/images/icon/apple-touch-icon.png">

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(160deg,#0f172a,#020617);
color:white;
text-align:center;
}

.hidden{
display:none !important;
}

#home{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.home-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
width:90%;
max-width:400px;
}

.home-box{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
cursor:pointer;
transition:0.2s;
}

.home-box:hover{
transform:scale(1.05);
background:rgba(59,130,246,0.2);
}

.home-box img{
width:60px;
margin-bottom:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.popup.hidden{
display:none;
}

.extras-box{
background:#0f172a;
padding:25px;
border-radius:16px;
width:300px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.league-grid-select{
display:flex;
flex-direction:column;
gap:10px;
}

@media(min-width:600px){
.league-grid-select{
flex-direction:row;
}
}

.league-box{
padding:15px;
border-radius:12px;
background:rgba(255,255,255,0.05);
cursor:pointer;
transition:0.2s;
}

.league-box.active{
background:rgba(59,130,246,0.4);
box-shadow:0 0 15px rgba(59,130,246,0.8);
}

#game{
min-height:100vh;
padding:20px;
}

#game:not(.hidden){
display:flex;
justify-content:center;
align-items:center;
}

.game-card{
position:relative;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border-radius:20px;
padding:35px 25px;
width:90%;
max-width:380px;
box-shadow:0 0 40px rgba(0,0,0,0.6),0 0 15px rgba(59,130,246,0.25);
display:flex;
flex-direction:column;
align-items:center;
gap:16px;
}

#logo{
width:180px;
}

#popup img#revealedLogo {
  width: 200px;
  max-width: 80vw;
  height: auto;
  margin-bottom: 20px;
}
  
.blur{
filter:blur(12px);
}

#guessInput{
width:85%;
font-size:16px;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 12px;
  background: rgba(59, 130, 246, 0.25);
  backdrop-filter: blur(6px);
  color: #ffffff;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s ease-in-out;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5);
}

button:hover {
  transform: translateY(-3px) scale(1.05);
  box-shadow: 0 6px 20px rgba(59, 130, 246, 0.7);
  background: rgba(59, 130, 246, 0.35);
}

button:active {
  transform: translateY(0) scale(0.98);
  box-shadow: 0 3px 10px rgba(59, 130, 246, 0.5);
}

.home-box {
  background: rgba(255, 255, 255, 0.05);
  border-radius: 16px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.home-box:hover {
  transform: translateY(-5px) scale(1.05);
  box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
  background: rgba(59, 130, 246, 0.15);
}

.home-box img {
  width: 80px;
  height: auto;
}

.progress-bar{
width:100%;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:10px;
overflow:hidden;
}

#progressFill{
height:100%;
width:0%;
background:linear-gradient(90deg,#3b82f6,#60a5fa);
}

</style>

</head>

<body>

<div id="home">

<h1>⚽ Badge Guesser</h1>

<div class="home-grid">

<div class="home-box" onclick="openDifficulty()">
<img src="images/difficulty.png">
<p>Difficulty</p>
</div>

<div class="home-box" onclick="openSelection()">
<img src="images/leagues.png">
<p>Selection</p>
</div>

<div class="home-box" onclick="startRandom()">
<img src="images/random.png">
<p>Random</p>
</div>

<div class="home-box" onclick="openOptions()">
<img src="images/options.png">
<p>Options</p>
</div>

</div>

</div>

<div id="game" class="hidden">

<div class="game-card">

<div class="progress-bar">
<div id="progressFill"></div>
</div>

<div>
<span id="progressText"></span> |
Score: <span id="score">0</span> |
Time: <span id="timer">15</span>
</div>

<img id="logo">

<input 
id="guessInput"
placeholder="Enter club name"
enterkeyhint="go"
autocapitalize="off"
autocomplete="new-password"
autocorrect="off"
spellcheck="false"
>

<button onclick="submitGuess()">Guess</button>

<p id="message"></p>

</div>

</div>

<div id="popup" class="popup hidden">

<h2 id="resultStatus"></h2>

<img id="revealedLogo">

<h2 id="resultText"></h2>

<p id="points"></p>
<p id="popupProgress"></p>

<button onclick="nextLogo()">Next</button>
<button onclick="quitGame()">Quit</button>

</div>

<div id="optionsPopup" class="popup hidden">

<div class="extras-box">

<h2>Options</h2>

<p>Logos: <span id="logoCount">10</span></p>

<input type="range" min="5" max="100" value="10" id="logoSlider">
<input type="number" min="5" max="100" value="10" id="logoInput">

<br><br>

<label>Blur</label>
<select id="blurToggle">
<option value="no" selected>No</option>
<option value="yes">Yes</option>
</select>

<br><br>

<label>Confetti</label>
<select id="confettiType">
<option value="squares">Squares</option>
<option value="circles">Circles</option>
<option value="mix">Mixed</option>
</select>

<br><br>

<label>Time</label>
<select id="timeSelect">
<option value="15">15 Seconds</option>
<option value="30">30 Seconds</option>
</select>

<br><br>

<label>Bonus</label>
<select id="bonusToggle">
<option value="yes" selected>Yes</option>
<option value="no">No</option>
</select>

<br><br>

<button onclick="closeOptions()">Close</button>

</div>

</div>

<div id="difficultyPopup" class="popup hidden">

<div class="extras-box">

<h2>Difficulty</h2>

<button onclick="setDifficulty(1)">⭐ Easy</button>
<button onclick="setDifficulty(2)">⭐⭐ Medium</button>
<button onclick="setDifficulty(3)">⭐⭐⭐ Hard</button>

<br><br>

<button onclick="closeDifficulty()">Back</button>

</div>

</div>

<div id="selectionPopup" class="popup hidden">
<div class="extras-box">
<h2>Select Leagues</h2>
<div class="league-grid-select">

<div class="league-box" onclick="toggleLeague('premier', this)">
<img src="images/premier.png">
<p>Premier League</p>
</div>

<div class="league-box" onclick="toggleLeague('laliga', this)">
<img src="images/laliga.png">
<p>LaLiga</p>
</div>

<div class="league-box" onclick="toggleLeague('bundesliga', this)">
<img src="images/bundesliga.png">
<p>Bundesliga</p>
</div>

<div class="league-box" onclick="toggleLeague('ligue1', this)">
<img src="images/ligue1.png">
<p>Ligue 1</p>
</div>

</div>

<br>

<button onclick="closeSelection()">Back</button>
<button onclick="startSelectionGame()">Go</button>

</div>

</div>

<div id="loadingScreen" class="popup hidden">
<h2>Loading...</h2>
</div>

<script src="premierleague.js"></script>
<script src="laliga.js"></script>
<script src="bundesliga.js"></script>
<script src="ligue1.js"></script>

<script src="main.js"></script>

</body>
</html>
